workflows:
  expo-ios:
    name: Expo iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagicFlutter

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alchono.app
      groups:
        - Ios_signing
        - supabase_credentials  # must contain EXPO_PUBLIC_SUPABASE_URL and EXPO_PUBLIC_SUPABASE_ANON_KEY
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        IOS_BUNDLE_IDENTIFIER: com.alchono.app
        # newArchEnabled: true is set in app.json; this env var keeps Xcode
        # and any native scripts consistent with that choice (SDK 52 / RN 0.76).
        RCT_NEW_ARCH_ENABLED: "1"

    scripts:
      - name: Print iOS signing assets detected by Codemagic
        script: |
          echo "== Code signing identities (name + SHA-1) =="
          security find-identity -v -p codesigning || true

          echo
          echo "== Provisioning profiles available =="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [[ -d "$PROFILE_DIR" ]]; then
            find "$PROFILE_DIR" -name "*.mobileprovision" -maxdepth 1 | while read -r profile; do
              echo
              echo "Profile file: $(basename "$profile")"
              security cms -D -i "$profile" > /tmp/codemagic_profile.plist
              /usr/libexec/PlistBuddy -c "Print :Name" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :UUID" /tmp/codemagic_profile.plist || true
              /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/codemagic_profile.plist || true
            done
          else
            echo "No provisioning profiles directory found at $PROFILE_DIR"
          fi

      - name: Install dependencies
        script: |
          npm install

      - name: Set unique build number
        script: |
          # Unix timestamp — always higher than the last upload so App Store
          # Connect never rejects a build for a duplicate CFBundleVersion.
          echo "ALCHONO_BUILD_NUMBER=$(date +%s)" >> $CM_ENV

      - name: Expo prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Set iOS build number
        script: |
          # app.json has a static buildNumber; overwrite it in the generated
          # Xcode project so every Codemagic build gets a unique value.
          cd ios
          agvtool new-version -all "$ALCHONO_BUILD_NUMBER"

      - name: Validate App Store Connect secrets
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          REQUIRED_VARS=(
            APP_STORE_CONNECT_KEY_IDENTIFIER
            APP_STORE_CONNECT_ISSUER_ID
            APP_STORE_CONNECT_PRIVATE_KEY
            IOS_BUNDLE_IDENTIFIER
          )
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!VAR_NAME:-}" ]]; then
              echo "Missing required Codemagic secret: $VAR_NAME"
              exit 1
            fi
          done
          echo "App Store Connect secrets detected."

      - name: Set up code signing
        script: |
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-${APP_STORE_CONNECT_KEY_ID:-}}"
          keychain initialize
          app-store-connect fetch-signing-files "$IOS_BUNDLE_IDENTIFIER" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key-password "${CERTIFICATE_PRIVATE_KEY_PASSWORD:-}" || true
          keychain add-certificates

          echo "== Certificates in keychain after setup =="
          security find-identity -v -p codesigning || true

          echo "== Provisioning profiles installed =="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          ls -1 "$PROFILE_DIR" 2>/dev/null || echo "No profiles directory found"

          cd ios
          # Apply profiles — without --warn-only so the build fails loudly if no profile is found
          xcode-project use-profiles

      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/*.xcworkspace \
            --scheme Alchono \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
